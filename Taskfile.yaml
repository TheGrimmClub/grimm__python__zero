version: '3'

# grimm__python__zero — day-two Python teaching package.
# Run `task` to list. Everything runs through uv (see GrimmSetup).

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  step1:
    desc: "Run step 1 — make an actor and print it"
    cmds:
      - uv run examples/step1.py

  step2:
    desc: "Run step 2 — name your actor and enter the dungeon"
    cmds:
      - uv run examples/step2.py

  dungeon:
    desc: "Run step 3 — open the door and enter the real dungeon"
    cmds:
      - uv run examples/step3.py

  save:
    desc: "Run step 4 — read your saved game (items, rooms, progress)"
    cmds:
      - uv run examples/step4.py

  test:
    desc: Run the tests
    cmds:
      - uv run --with pytest pytest -q

  repl:
    desc: Open a Python shell with grimm ready to import
    cmds:
      - uv run python

  # --- Packaging & release -------------------------------------------------

  build:
    desc: Build the sdist + wheel into dist/
    cmds:
      - rm -rf dist
      - uv build

  check:
    desc: Build and validate the package metadata for PyPI
    cmds:
      - task: build
      - uvx twine check dist/*

  release:
    desc: 'Cut a GitHub release → publishes to PyPI via trusted publishing (usage: task release -- v0.1.0)'
    preconditions:
      - sh: command -v gh
        msg: "GitHub CLI (gh) is required to create a release."
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Pass a version tag, e.g.  task release -- v0.1.0"
    cmds:
      - gh release create {{.CLI_ARGS}} --title "{{.CLI_ARGS}}" --generate-notes

  publish-local:
    desc: 'Fallback: build and upload to PyPI from your machine with a token (prefer `task release`)'
    cmds:
      - task: check
      - uv publish
